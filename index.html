<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Book Way</title>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="display-4 my-5">
                Book Way
            </h1>
            <button class="btn btn-dark" id="clear">
                Clear All
            </button>

        </div>

          <!-- own alert -->
        <div class="show-alert"></div>

        <form id="book-form">
            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="title" placeholder="Add title for you book" >
                <label for="title">Title</label>
            </div>

            <div class="form-floating mb-4">
                <input type="text" class="form-control" id="author" placeholder="Add author for you book" >
                <label for="author">Author</label>
            </div>

            <div class="form-floating mb-4">
                <input type="number" class="form-control" id="isbn" placeholder="Add isbn for you book" >
                <label for="isbn">ISBN</label>
            </div>
            <button type="submit" class="btn btn-dark">
                Add
            </button>
            <br>
        </form>
  
        
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>ISBN</th>
                </tr>
            </thead>
            <tbody id="book-list">
                <tr>
                   <!--  <td>cricket</td>
                    <td>yuvan</td>
                    <td>1234</td>
                    <td  class="delete">
                        <span class="btn btn-danger">X</span>
                    </td> -->
                </tr>
            </tbody>
        </table>
       
    </div>

    <script src="./app.js"></script>
</body>
</html>
